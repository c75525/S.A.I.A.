  <meta property="og:image:type" content="image/png">

  <link rel="stylesheet" href="https://use.typekit.net/aut1aeg.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

    html {
      width: 100%;
      overflow-x: hidden;
      max-width: 100vw;
    }

    body {
      width: 100%;
      overflow-x: hidden;
      max-width: 100vw;
      background: #f2f2f2;
      transition: background 0.4s ease;
      font-family: 'aktiv-grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    #logo-scene {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 15vh 0;
    }

    .site-svg {
      display: block;
      height: 80vh;
      width: auto;
      max-width: 1188px;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 1s ease;
    }

    @media (max-width: 600px) {
      html, body {
        overflow: hidden;
        height: 100%;
      }
      .site-svg {
        width: 115vw;
        height: auto;
        margin: 0 -10vw 0 -5vw;
        display: block;
      }
    }

    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    #arrows {
      transform-origin: 500.37px 700.35px;
      animation: spin-ccw 18s linear infinite;
    }

    #logo-btn {
      cursor: pointer;
    }

    /* All SVG colour transitions */
    .cls-16, .cls-17, .cls-20, .cls-21,
    #bg-rect, .text-layer * {
      transition: fill 0.4s ease, opacity 0.4s ease;
    }

    
    /* ── DARK MODE : COLOR VALUE SWAP ───────────────────────── */

    body.dark {
      background: #848484;
    }

    body.dark #bg-rect {
      fill: #848484;
    }

    /* lavender -> white */
    body.dark .cls-21 {
      fill: #ffffff;
    }

    /* white -> dark */
    body.dark .cls-16 {
      fill: #2a2a2a;
    }

    /* circles -> lavender */
    body.dark .cls-17 {
      fill: #e1dee8;
      opacity: .5;
    }

    /* cutouts */
    body.dark .cls-20 {
      fill: #848484;
    }

    /* text -> brightest */
    body.dark .text-fill,
    body.dark .cls-11,
    body.dark .cls-14,
    body.dark .cls-22,
    body.dark a text {
      fill: #f2f2f2;
    }

    body.dark a text {
      text-decoration-color: #f2f2f2;
    }

    /* meeting counter label -> lavender in dark mode */
    body.dark .mc-label-text {
      fill: #e1dee8;
    }

    #logo-btn,
    #mid-layer,
    #wordmark-layer,
    #text-layer {
      will-change: transform, opacity, filter;
      transition:
        opacity 0.5s ease,
        filter 0.5s ease;
    }



    /* ── Logo 3D perspective tilt ── */
    #logo-tilt-wrap {
      position: absolute;
      /* sized to match the logo area in the SVG at its rendered size */
      pointer-events: none;
    }
    #logo-tilt-inner {
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      will-change: transform;
    }
  </style>
</head>

<script>
(function () {

  const body = document.body;

  const logoLayer = document.getElementById('logo-btn');
  const midLayer = document.getElementById('mid-layer');
  const wordmarkLayer = document.getElementById('wordmark-layer');
  const textLayer = document.getElementById('text-layer');

  /* ─────────────────────────────
     NIGHT MODE TOGGLE
  ───────────────────────────── */

  function toggleTheme(e) {
    e.stopPropagation();
    body.classList.toggle('dark');
  }

  logoLayer.addEventListener('click', toggleTheme);

  logoLayer.querySelectorAll('*').forEach(el => {
    el.style.cursor = 'pointer';
    el.addEventListener('click', toggleTheme);
  });

  // Mobile tap: touchend fires reliably even when touchmove is active
  logoLayer.addEventListener('touchend', function(e) {
    e.preventDefault();
    toggleTheme(e);
  }, { passive: false });

  /* ─────────────────────────────
     MULTI-LAYER PARALLAX
  ───────────────────────────── */

  let current = 0;
  let target = 0;

  const isMobile = window.matchMedia('(max-width: 600px)').matches;

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function animate() {

    target = window.scrollY;

    // On mobile, snap faster so thumb-scroll momentum is felt immediately
    const lerpFactor = isMobile ? 0.18 : 0.065;
    current = lerp(current, target, lerpFactor);

    // layer depths — boosted on mobile so the effect reads clearly on a small screen
    const far   = current * (isMobile ? 0.06  : 0.02);
    const mid   = current * (isMobile ? 0.13  : 0.045);
    const close = current * (isMobile ? 0.24  : 0.085);

    // atmospheric softness
    const velocity = Math.abs(target - current);

   const blur = Math.min(velocity * 0.006, 0.22);
   const opacity = 1 - Math.min(velocity * 0.00035, 0.02);

    // farthest: logo
    logoLayer.style.transform =
      `translateY(${far}px)`;

    // middle: building + SAIA wordmark
    midLayer.style.transform =
      `translateY(${mid}px)`;

    wordmarkLayer.style.transform =
      `translateY(${mid}px)`;

    // closest: text + links
    textLayer.style.transform =
      `translateY(${close}px)`;

    textLayer.style.filter =
      `blur(${blur}px)`;

    textLayer.style.opacity =
      opacity;

    requestAnimationFrame(animate);
  }

  animate();

  // ── LOGO 3D TILT ─────────────────────────────────
  (function() {
    const svg    = document.querySelector('.site-svg');
    const inner  = document.getElementById('logo-tilt-inner');
    const logoG  = document.getElementById('logo-btn');

    // Logo center in SVG coords
    const LOGO_CX_SVG = 500;
    const LOGO_CY_SVG = 700;
    const LOGO_R_SVG  = 340; // interaction radius in SVG units

    let tX = 0, tY = 0, cX = 0, cY = 0;

    function getLogoCenter() {
      const vb = svg.viewBox.baseVal;
      const rect = svg.getBoundingClientRect();
      const scaleX = rect.width  / vb.width;
      const scaleY = rect.height / vb.height;
      return {
        x: rect.left + LOGO_CX_SVG * scaleX,
        y: rect.top  + LOGO_CY_SVG * scaleY,
        r: LOGO_R_SVG * ((scaleX + scaleY) / 2)
      };
    }

    window.addEventListener('mousemove', (e) => {
      const c = getLogoCenter();
      const dx = e.clientX - c.x;
      const dy = e.clientY - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // Smooth proximity falloff: 0 strength at edge, full strength at center
      const maxR = c.r * 1.5;
      const strength = Math.max(0, 1 - dist / maxR);
      // Ease the strength curve so entry is gradual
      const eased = strength * strength;
      tX =  (dx / c.r) * 18 * eased;
      tY = -(dy / c.r) * 18 * eased;
    });

    window.addEventListener('mouseleave', () => { tX = 0; tY = 0; });

    // Touch support
    window.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const c = getLogoCenter();
      const dx = touch.clientX - c.x;
      const dy = touch.clientY - c.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < c.r * 1.5) {
        tX =  (dx / c.r) * 14;
        tY = -(dy / c.r) * 14;
      } else {
        tX = 0; tY = 0;
      }
    }, { passive: true });

    window.addEventListener('touchend', () => { tX = 0; tY = 0; });

    function tiltLoop() {
      cX += (tX - cX) * 0.08;
      cY += (tY - cY) * 0.08;
      logoG.style.transform = `perspective(900px) rotateX(${cY}deg) rotateY(${cX}deg)`;
      logoG.style.transformBox = 'fill-box';
      logoG.style.transformOrigin = 'center';
      requestAnimationFrame(tiltLoop);
    }
    tiltLoop();
  })();



  function fadeIn(el, duration) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      // ease in-out sine
      const e = -(Math.cos(Math.PI * t) - 1) / 2;
      el.setAttribute('opacity', e);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  function flickerIn(el, startDelay) {
    const frames = [0,0, 80,0.8, 160,0, 240,0.9, 300,0.1, 380,1, 420,0.3, 500,1, 560,0.6, 640,1, 680,0.4, 760,1];
    for (let i = 0; i < frames.length; i += 2) {
      (function(delay, opacity) {
        setTimeout(function() {
          el.setAttribute('opacity', opacity);
        }, startDelay + delay);
      })(frames[i], frames[i+1]);
    }
  }

  // Fade in SVG on load
  document.fonts.ready.then(function() {
    setTimeout(function() {
      document.querySelector('.site-svg').style.opacity = 1;
    }, 500);
  });

  document.fonts.ready.then(function() {
    setTimeout(function() {
      flickerIn(document.getElementById('meeting-location'), 0);
    }, 2000);
    setTimeout(function() {
      flickerIn(document.getElementById('meeting-time'), 0);
    }, 2700);
  });


  // ── MEETING COUNTER ──────────────────────────────
  // Fetch number from txt file, fall back to hardcoded value
  fetch('meeting_count.txt')
    .then(r => r.text())
    .then(t => {
      const num = t.trim();
      document.getElementById('mc-number').textContent = num;
    })
    .catch(() => { /* keep default 009 */ });

  function animateCurtain(el, fromY, height, duration) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      // ease out quint — smooth deceleration
      const e = 1 - Math.pow(1 - t, 5);
      const currentH = e * height;
      const currentY = fromY + height - currentH;
      el.setAttribute('y', currentY);
      el.setAttribute('height', currentH);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  document.fonts.ready.then(function() {
    setTimeout(function() {
      // 1. show the whole group
      document.getElementById('meeting-counter').setAttribute('opacity', 1);
      // 2. fade in the label
      fadeIn(document.getElementById('mc-label'), 800);
      // 3. after label fades, rise the badge curtain
      setTimeout(function() {
        animateCurtain(document.getElementById('badge-clip-rect'), 1187.48, 29.75, 1200);
      }, 1000);
    }, 4000);
  });

})();
</script>
